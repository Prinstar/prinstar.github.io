<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MADAAD VENTURES • Tech Store</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="app.js"></script>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <div>
  <a class="brand" href="index.html">MADAAD VENTURES</a>
  <div class="muted" style="font-size:11px; letter-spacing:.12em; text-transform:uppercase">
    Premium Tech
  </div>
</div>

      <a class="btn" href="cart.html">Back to cart</a>
      <a class="btn" href="cart.html">
        Cart <span class="badge" data-cart-badge>0</span>
      </a>
    </div>
  </header>

    <button class="btn" id="themeToggle" type="button" aria-label="Toggle theme">
  🌙
</button>
  <main class="container">
    <h1 style="margin:18px 0 6px">Checkout</h1>

    <div class="panel" style="margin-top:14px">
      <div class="row">
        <div>
          <div class="muted">Items</div>
          <div style="font-weight:900" id="checkoutItems">0</div>
        </div>
        <div>
          <div class="muted">Subtotal</div>
          <div style="font-weight:900" id="checkoutSubtotal">$0.00</div>
        </div>
      </div>

      <hr style="border-color:var(--border); opacity:.6; margin:14px 0">

      <form id="checkoutForm" class="form">
        <div>
          <label>First name</label>
          <input name="firstName" required />
        </div>
        <div>
          <label>Last name</label>
          <input name="lastName" required />
        </div>
        <div class="full">
          <label>Email</label>
          <input name="email" type="email" required />
        </div>
        <div class="full">
          <label>Address</label>
          <input name="address" required />
        </div>
        <div>
          <label>City</label>
          <input name="city" required />
        </div>
        <div>
          <label>ZIP</label>
          <input name="zip" required />
        </div>
        <div class="full" style="display:flex; justify-content:flex-end; gap:10px">
          <a class="btn" href="cart.html">Cancel</a>
          <button class="btn primary" type="submit">Place order</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
